# Medusa Configuration File
# Customize scoring weights (must sum to 1.0)

[scoring]
complexity_weight = 0.6  # Weight for complexity score (default: 0.6)
value_weight = 0.3          # Weight for value score (default: 0.3)
keyword_weight = 0.1        # Weight for keyword bonuses (default: 0.1)

# Custom tier thresholds (optional - uses defaults if not specified)
[tier_thresholds]
# Godlike = 95.0
# Unique = 90.0
# Legendary = 85.0
# Mythic = 80.0
# Epic = 75.0
# Ultra Rare = 65.0
# Rare = 55.0
# Uncommon = 45.0
# Common = 25.0
# Poor = 0.0

# Dreaming configuration
[dreaming]
frequency_scans = 1       # Run dream every N scans (default: 1)
retention_percent = 0.8   # Memory retention (0.0-1.0, higher = keep more, default: 0.8)
auto_apply = true          # Auto-apply pattern changes (default: true)
max_insights = 200         # Maximum insights to keep after consolidation (default: 200)
